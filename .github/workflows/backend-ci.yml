name: Backend CI

on:
  push:
    branches:
      - main
      - '**'
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches:
      - main
      - '**'
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier check
        # Removemos o --config para ele ignorar a raiz e usar o padrão ou o que estiver no backend
        run: npx prettier --check .

      - name: Run Tests
        run: npm test