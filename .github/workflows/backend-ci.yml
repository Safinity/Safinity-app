name: Backend CI

on:
  push:
    branches:
      - main # Corre sempre na main
  pull_request:
    branches:
      - main # Corre sempre em qualquer PR para a main
  # Regra para as restantes branches:
  push:
    branches-ignore:
      - main
    paths:
      - 'backend/**'
  pull_request:
    branches-ignore:
      - main
    paths:
      - 'backend/**'

jobs:
  ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier check
        # Mantemos o caminho para o config na raiz
        run: npx prettier --check .

      - name: Run Tests
        run: npm test