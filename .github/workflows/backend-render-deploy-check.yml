name: Backend Render Deploy Check

on:
  workflow_run:
    workflows:
      - Backend CI
    types:
      - completed

jobs:
  health-check:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'

    steps:
      - name: Wait for Render deploy and check health
        run: |
          set -e

          HEALTH_URL="https://safinity-app.onrender.com/health"

          echo "Waiting for Render deployment..."
          sleep 90

          for attempt in {1..30}; do
            STATUS=$(curl -s -o /tmp/health.txt -w "%{http_code}" "$HEALTH_URL" || true)

            if [ "$STATUS" = "200" ]; then
              echo "Backend deployed successfully"
              cat /tmp/health.txt
              exit 0
            fi

            echo "Attempt $attempt/30 failed with HTTP $STATUS"
            sleep 10
          done

          echo "Backend deploy health check failed"
          cat /tmp/health.txt || true
          exit 1