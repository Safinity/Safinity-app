name: Build & Deploy Safinity Backoffice Frontend

on:
  push:
    paths:
      - 'backoffice/frontend/**'
    branches:
      - '**'
  pull_request:
    paths:
      - 'backoffice/frontend/**'
    branches:
      - main

jobs:
  build:
    name: Lint, Prettier & Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: backoffice/frontend

      - name: Run ESLint
        run: npm run lint
        working-directory: backoffice/frontend

      - name: Run Prettier Check
        run: npm run format:check
        working-directory: backoffice/frontend

      - name: Build frontend
        run: npm run build
        working-directory: backoffice/frontend
        env:
          VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: safinity-backoffice-dist
          path: backoffice/frontend/dist

  deploy:
    name: Deploy to Netlify
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        

        with:
          name: safinity-backoffice-dist
          path: out

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Deploy
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: netlify deploy --dir=out --prod --site=$NETLIFY_SITE_ID --auth=$NETLIFY_AUTH_TOKEN