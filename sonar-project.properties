sonar.projectKey=andredora_Safinity-app
sonar.organization=safinity
sonar.host.url=https://sonarcloud.io

sonar.projectName=Safinity
sonar.projectVersion=1.0

sonar.sourceEncoding=UTF-8

sonar.sources=backend/src,frontend/app,frontend/components,frontend/constants,frontend/context,frontend/types,frontend/utils,backoffice/frontend/src
sonar.tests=backend/src,backend/test
sonar.test.inclusions=backend/src/**/*.spec.ts,backend/test/**/*.ts

sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/.expo/**,**/android/**,**/ios/**,**/generated/**,**/*.config.js,**/*.config.ts,**/*.d.ts,**/*.jpg,**/*.jpeg,**/*.png,**/*.svg,**/*.webp
sonar.coverage.exclusions=frontend/**,backoffice/**,backend/src/main.ts,backend/src/**/*.module.ts,backend/src/**/*.dto.ts,backend/src/**/*.spec.ts

sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info
sonar.typescript.tsconfigPaths=backend/tsconfig.json,frontend/tsconfig.json,backoffice/frontend/tsconfig.json
